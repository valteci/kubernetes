apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-disk-pv
  namespace: lab
  labels:
    app.kubernetes.io/name: storage-lab
    app.kubernetes.io/component: persistent-volume-claim
spec:
  storageClassName: manual-disk-pv
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 10G
